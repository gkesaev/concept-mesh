name: concept-mesh

services:
  # ──────────────────────────────────────────────────────────
  # PostgreSQL 16 with pgvector
  # ──────────────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-concept}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-concept}
      POSTGRES_DB: ${POSTGRES_DB:-conceptmesh}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"   # Exposed as 5433 to avoid conflicts with local postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-concept} -d ${POSTGRES_DB:-conceptmesh}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────────────────
  # DB migration runner (runs once then exits)
  # ──────────────────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: sh -c "npx drizzle-kit migrate && npm run db:seed"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-concept}:${POSTGRES_PASSWORD:-concept}@db:5432/${POSTGRES_DB:-conceptmesh}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ──────────────────────────────────────────────────────────
  # Next.js app — development with hot reload
  # ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-concept}:${POSTGRES_PASSWORD:-concept}@db:5432/${POSTGRES_DB:-conceptmesh}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    volumes:
      # Bind-mount source for hot reload
      - .:/app
      # Keep container's node_modules (don't overwrite with host)
      - /app/node_modules
      # Persist Next.js build cache between restarts
      - nextjs_cache:/app/.next
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/mesh || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  nextjs_cache:
