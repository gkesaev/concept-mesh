<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sine Wave Oscillator</title>
    <style>
      :root {
        --cm-bg: #0b1020;
        --cm-surface: #141a2e;
        --cm-text: #e8ecff;
        --cm-accent: #7c5cff;
        --cm-border: #2a3150;
      }
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--cm-bg);
        color: var(--cm-text);
        font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      main { padding: 24px; max-width: 640px; margin: 0 auto; display: grid; gap: 16px; }
      h1 { font-size: 18px; font-weight: 600; margin: 0; }
      .panel {
        background: var(--cm-surface);
        border: 1px solid var(--cm-border);
        border-radius: 12px;
        padding: 16px;
      }
      canvas { display: block; width: 100%; height: 200px; border-radius: 8px; background: var(--cm-bg); }
      .controls { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
      button {
        background: var(--cm-accent);
        color: var(--cm-bg);
        border: 0;
        padding: 8px 14px;
        border-radius: 8px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button:focus-visible { outline: 2px solid var(--cm-text); outline-offset: 2px; }
      .freq { display: flex; align-items: center; gap: 8px; flex: 1; }
      .freq label { color: color-mix(in srgb, var(--cm-text) 75%, transparent); }
      .freq output { font-variant-numeric: tabular-nums; color: var(--cm-accent); font-weight: 600; min-width: 48px; text-align: right; }
      input[type="range"] {
        -webkit-appearance: none; appearance: none;
        flex: 1; height: 4px; background: var(--cm-border); border-radius: 2px; outline: none;
      }
      input[type="range"]:focus-visible { box-shadow: 0 0 0 2px var(--cm-accent); }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none;
        width: 16px; height: 16px; border-radius: 50%;
        background: var(--cm-accent); cursor: pointer; border: 0;
      }
      input[type="range"]::-moz-range-thumb {
        width: 16px; height: 16px; border-radius: 50%;
        background: var(--cm-accent); cursor: pointer; border: 0;
      }
      @media (prefers-reduced-motion: reduce) {
        canvas { animation: none; }
      }
    </style>
  </head>
  <body>
    <main aria-labelledby="title">
      <h1 id="title">Sine Wave Oscillator</h1>
      <div class="panel">
        <canvas id="wave" width="600" height="200" aria-label="Animated sine wave, frequency adjustable"></canvas>
        <div class="controls">
          <button id="toggle" type="button" aria-pressed="true">Pause</button>
          <div class="freq">
            <label for="freq">Frequency</label>
            <input id="freq" type="range" min="0.2" max="3" step="0.1" value="1" aria-valuemin="0.2" aria-valuemax="3" aria-valuenow="1" />
            <output id="freq-out" for="freq">1.0 Hz</output>
          </div>
        </div>
      </div>
    </main>
    <script>
      (function () {
        var canvas = document.getElementById('wave');
        var ctx = canvas.getContext('2d');
        var freq = document.getElementById('freq');
        var freqOut = document.getElementById('freq-out');
        var toggle = document.getElementById('toggle');

        var reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
        var running = !reduced;
        if (reduced) { toggle.textContent = 'Play'; toggle.setAttribute('aria-pressed', 'false'); }

        var dpr = Math.min(window.devicePixelRatio || 1, 2);
        function resize() {
          var r = canvas.getBoundingClientRect();
          canvas.width = Math.max(1, Math.floor(r.width * dpr));
          canvas.height = Math.max(1, Math.floor(r.height * dpr));
        }
        resize();
        addEventListener('resize', resize);

        var styles = getComputedStyle(document.documentElement);
        function cssVar(name) { return styles.getPropertyValue(name).trim(); }

        var start = performance.now();
        function draw(now) {
          var t = (now - start) / 1000;
          var w = canvas.width, h = canvas.height;
          ctx.clearRect(0, 0, w, h);
          ctx.strokeStyle = cssVar('--cm-border'); ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(0, h / 2); ctx.lineTo(w, h / 2); ctx.stroke();
          ctx.strokeStyle = cssVar('--cm-accent'); ctx.lineWidth = 2 * dpr;
          ctx.beginPath();
          var f = +freq.value;
          for (var x = 0; x < w; x++) {
            var theta = (x / w) * Math.PI * 4 * f + (running ? t * 2 * Math.PI * f : 0);
            var y = h / 2 + Math.sin(theta) * (h * 0.35);
            if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          }
          ctx.stroke();
          if (running) requestAnimationFrame(draw);
        }
        requestAnimationFrame(draw);

        freq.addEventListener('input', function () {
          freqOut.textContent = (+freq.value).toFixed(1) + ' Hz';
          freq.setAttribute('aria-valuenow', freq.value);
          if (!running) requestAnimationFrame(draw);
        });
        toggle.addEventListener('click', function () {
          running = !running;
          toggle.textContent = running ? 'Pause' : 'Play';
          toggle.setAttribute('aria-pressed', String(running));
          if (running) { start = performance.now(); requestAnimationFrame(draw); }
        });
      })();
    </script>
  </body>
</html>
