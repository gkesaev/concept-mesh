<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Binary Search Tree</title>
    <style>
      :root {
        --cm-bg: #0b1020;
        --cm-surface: #141a2e;
        --cm-text: #e8ecff;
        --cm-accent: #7c5cff;
        --cm-border: #2a3150;
      }
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--cm-bg);
        color: var(--cm-text);
        font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      main { padding: 24px; max-width: 640px; margin: 0 auto; }
      h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px; }
      p  { margin: 0 0 20px; color: color-mix(in srgb, var(--cm-text) 75%, transparent); }
      .diagram {
        background: var(--cm-surface);
        border: 1px solid var(--cm-border);
        border-radius: 12px;
        padding: 16px;
      }
      .node circle { fill: var(--cm-surface); stroke: var(--cm-accent); stroke-width: 2; }
      .node text   { fill: var(--cm-text); font-size: 13px; text-anchor: middle; dominant-baseline: central; }
      .edge        { stroke: var(--cm-border); stroke-width: 1.5; fill: none; }
      .target circle { fill: var(--cm-accent); }
      .target text   { fill: var(--cm-bg); font-weight: 600; }
    </style>
  </head>
  <body>
    <main aria-labelledby="title">
      <h1 id="title">Binary Search Tree</h1>
      <p>Each node's left subtree holds smaller values, right subtree holds larger. Searching halves the space at every step.</p>
      <div class="diagram" role="img" aria-label="Binary search tree with root 8, highlighting the path from root to node 6">
        <svg viewBox="0 0 400 240" width="100%" height="240" aria-hidden="true">
          <path class="edge" d="M200,40 L120,100" />
          <path class="edge" d="M200,40 L280,100" />
          <path class="edge" d="M120,100 L70,160" />
          <path class="edge" d="M120,100 L170,160" />
          <path class="edge" d="M280,100 L240,160" />
          <path class="edge" d="M280,100 L330,160" />
          <g class="node target"><circle cx="200" cy="40"  r="22" /><text x="200" y="40">8</text></g>
          <g class="node target"><circle cx="120" cy="100" r="22" /><text x="120" y="100">4</text></g>
          <g class="node">       <circle cx="280" cy="100" r="22" /><text x="280" y="100">12</text></g>
          <g class="node">       <circle cx="70"  cy="160" r="22" /><text x="70"  y="160">2</text></g>
          <g class="node target"><circle cx="170" cy="160" r="22" /><text x="170" y="160">6</text></g>
          <g class="node">       <circle cx="240" cy="160" r="22" /><text x="240" y="160">10</text></g>
          <g class="node">       <circle cx="330" cy="160" r="22" /><text x="330" y="160">14</text></g>
        </svg>
      </div>
    </main>
  </body>
</html>
